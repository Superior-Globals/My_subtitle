services:
  - type: web
    name: iptv-subtitle-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python subtitle-server.py
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false        # you paste this in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false        # you paste your Lovable app URL here
      - key: PORT
        value: 8080        # Render uses 8080
